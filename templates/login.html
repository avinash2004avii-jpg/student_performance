<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0a0016;
font-family:Arial, sans-serif;
}

/* Login Card */
.container{
width:1100px;
height:550px;
display:flex;
box-shadow:0 0 30px #7b2cff;
border-radius:12px;
overflow:hidden;
}

/* Left Login Section */
.left{
width:50%;
background:#000;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:60px;
}

.left h2{
margin-bottom:40px;
font-size:30px;
}

/* Input Fields */
.input-box{
width:80%;
margin-bottom:25px;
}

.input-box input{
width:100%;
padding:14px;
font-size:16px;
background:none;
border:none;
border-bottom:2px solid white;
color:white;
outline:none;
}

/* ===== Uiverse Login Button ===== */

.user-profile {
width:131px;
height:51px;
border-radius:15px;
cursor:pointer;
transition:0.3s ease;
background:linear-gradient(
to bottom right,
#2e8eff 0%,
rgba(46,142,255,0) 30%
);
background-color:rgba(46,142,255,0.2);
display:flex;
align-items:center;
justify-content:center;
margin-top:20px;
border:none;
}

.user-profile:hover{
background-color:rgba(46,142,255,0.7);
box-shadow:0 0 10px rgba(46,142,255,0.5);
}

.user-profile-inner{
width:127px;
height:47px;
border-radius:13px;
background-color:#1a1a1a;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
color:white;
font-weight:600;
}

.user-profile-inner svg{
width:24px;
height:24px;
fill:white;
}

/* Right Welcome Section */

.right{
width:50%;
background:linear-gradient(135deg,#4b0082,#8a2be2);
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
padding:40px;
}

.right h1{
font-size:42px;
margin-bottom:10px;
}

.right p{
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<!-- Left Side Login -->
<div class="left">

<h2>Login</h2>

<form action="/login" method="POST">

<div class="input-box">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit" class="user-profile">

<div class="user-profile-inner">

<svg viewBox="0 0 24 24">
<path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8V22h19.2v-2.8c0-3.2-6.4-4.8-9.6-4.8z"/>
</svg>

<span>Log In</span>

</div>

</button>

</form>

</div>

<!-- Right Side Welcome -->
<div class="right">

<div>
<h1>WELCOME BACK!</h1>
<p>AI Student Performance Prediction System</p>
</div>

</div>

</div>

</body>
</html>
